<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serpendino Geam - Login/Register</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="container">
    <h1>Benvenuto al Serpendino Geam</h1>

    <div id="register-form">
        <h2>Registrati</h2>
        <input type="text" id="regNome" placeholder="Nome">
        <input type="text" id="regCognome" placeholder="Cognome">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPassword" placeholder="Password">
        <button onclick="registerUser()">Registrati</button>
    </div>

    <div id="login-form">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="loginUser()">Login</button>
    </div>

</div>

<script>
let users = JSON.parse(localStorage.getItem('users')) || [];

window.onload = function(){
    if(users.length>0){
        document.getElementById('register-form').style.display="none";
        document.getElementById('login-form').style.display="block";
        document.getElementById('loginEmail').value = users[users.length-1].email;
    } else {
        document.getElementById('register-form').style.display="block";
        document.getElementById('login-form').style.display="none";
    }
}

function saveUsers(){ localStorage.setItem('users', JSON.stringify(users)); }

function registerUser(){
    const nome = document.getElementById('regNome').value;
    const cognome = document.getElementById('regCognome').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;

    if(!nome||!cognome||!email||!password){ alert("Compila tutti i campi!"); return;}
    if(users.find(u=>u.email===email)){ alert("Utente già registrato!"); return;}
    users.push({nome,cognome,email,password});
    saveUsers();
    alert("Registrazione completata! Effettua il login.");
    document.getElementById('register-form').style.display="none";
    document.getElementById('login-form').style.display="block";
    document.getElementById('loginEmail').value=email;
}

function loginUser(){
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const user = users.find(u=>u.email===email && u.password===password);
    if(user){
        localStorage.setItem('currentUser', email);
        window.location.href="profile.html";
    } else { alert("Email o password errata!"); }
}
</script>
</body>
</html>
