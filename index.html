<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LukiPup - Benvenuto</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background-color: #f5f5f5;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  #container {
    background: #fff;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    width: 320px;
    text-align: center;
  }
  h1 {
    margin-bottom: 20px;
    color: #333;
  }
  input[type=text], input[type=email], input[type=password] {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 7px;
    border: 1px solid #ccc;
    font-size: 14px;
  }
  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background-color: #ff6600;
    border: none;
    border-radius: 7px;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
  }
  button:hover {
    background-color: #e65c00;
  }
  a {
    display: block;
    margin-top: 12px;
    text-decoration: none;
    color: #555;
  }
  a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div id="container">
  <h1>LukiPup</h1>

  <div id="register-form">
    <h2>Registrati</h2>
    <input type="text" id="regNome" placeholder="Nome">
    <input type="text" id="regCognome" placeholder="Cognome">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPassword" placeholder="Password">
    <button onclick="registerUser()">Registrati</button>
  </div>

  <div id="login-form">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="loginUser()">Login</button>
    <a href="#" id="forgotPassword">Hai dimenticato la password?</a>
  </div>

</div>

<script>
let users = JSON.parse(localStorage.getItem('users')) || [];

// Mostra form giusto
window.onload = function(){
    if(users.length > 0){
        document.getElementById('register-form').style.display = "none";
        document.getElementById('login-form').style.display = "block";
        document.getElementById('loginEmail').value = users[users.length-1].email;
    } else {
        document.getElementById('register-form').style.display = "block";
        document.getElementById('login-form').style.display = "none";
    }
};

// Salva utenti su localStorage
function saveUsers(){ localStorage.setItem('users', JSON.stringify(users)); }

// REGISTRAZIONE
function registerUser(){
    const nome = document.getElementById('regNome').value.trim();
    const cognome = document.getElementById('regCognome').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;

    if(!nome || !cognome || !email || !password){ 
        alert("Compila tutti i campi!"); 
        return;
    }

    if(users.find(u => u.email === email)){ 
        alert("Utente già registrato!"); 
        return;
    }

    const newUser = {
        nome,
        cognome,
        email,
        password,
        profile: { nick: nome, avatar: "" }
    };

    users.push(newUser);
    saveUsers();
    localStorage.setItem('currentUser', email);

    alert("Registrazione completata! Verrai portato alla chat.");
    window.location.href = "chat.html";
}

// LOGIN
function loginUser(){
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const user = users.find(u => u.email === email && u.password === password);

    if(user){
        localStorage.setItem('currentUser', email);
        window.location.href = "chat.html";
    } else {
        alert("Email o password errata!");
    }
}

// RECUPERO PASSWORD
document.getElementById('forgotPassword').addEventListener('click', function(){
    const email = prompt("Inserisci la tua email per ripristinare la password:");
    if(!email) return alert("Email non inserita!");

    const user = users.find(u => u.email === email);
    if(!user) return alert("Email non trovata!");

    const resetCode = Math.floor(100000 + Math.random() * 900000);
    alert("Codice di reset generato (simulazione): " + resetCode);

    const enteredCode = prompt("Inserisci il codice ricevuto via email:");
    if(parseInt(enteredCode) !== resetCode){
        return alert("Codice errato! Password non modificata.");
    }

    const newPass = prompt("Inserisci la nuova password:");
    if(!newPass) return alert("Password non modificata!");

    user.password = newPass;
    saveUsers();
    alert("Password aggiornata! Ora puoi fare il login.");
    document.getElementById('loginEmail').value = user.email;
    document.getElementById('loginPassword').value = "";
});
</script>

</body>
</html>
