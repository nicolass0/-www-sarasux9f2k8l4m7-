<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serpendino Geam - Login/Register</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="container">
    <h1>Benvenuto al Serpendino Geam</h1>

    <div id="register-form">
        <h2>Registrati</h2>
        <input type="text" id="regNome" placeholder="Nome">
        <input type="text" id="regCognome" placeholder="Cognome">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPassword" placeholder="Password">
        <button onclick="registerUser()">Registrati</button>
    </div>

    <div id="login-form">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="loginUser()">Login</button>
        <p><a href="#" id="forgotPassword">Hai dimenticato la password?</a></p>
    </div>

</div>

<script>
let users = JSON.parse(localStorage.getItem('users')) || [];

// Mostra login o registrazione al caricamento
window.onload = function(){
    if(users.length > 0){
        document.getElementById('register-form').style.display = "none";
        document.getElementById('login-form').style.display = "block";
        document.getElementById('loginEmail').value = users[users.length-1].email;
    } else {
        document.getElementById('register-form').style.display = "block";
        document.getElementById('login-form').style.display = "none";
    }
}

// Salva utenti
function saveUsers(){ 
    localStorage.setItem('users', JSON.stringify(users)); 
}

// REGISTRAZIONE
function registerUser(){
    const nome = document.getElementById('regNome').value.trim();
    const cognome = document.getElementById('regCognome').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;

    if(!nome || !cognome || !email || !password){ 
        alert("Compila tutti i campi!"); 
        return;
    }

    if(users.find(u => u.email === email)){ 
        alert("Utente già registrato!"); 
        return;
    }

    const newUser = {
        nome,
        cognome,
        email,
        password,
        profile: {
            nick: nome,
            avatar: ""
        }
    };

    users.push(newUser);
    saveUsers();

    // Imposta utente corrente
    localStorage.setItem('currentUser', email);

    alert("Registrazione completata! Verrai portato direttamente alla chat.");
    window.location.href = "chat.html"; // redirect automatico
}

// LOGIN
function loginUser(){
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const user = users.find(u => u.email === email && u.password === password);

    if(user){
        localStorage.setItem('currentUser', email);
        window.location.href = "chat.html";
    } else {
        alert("Email o password errata!");
    }
}

// RECUPERO PASSWORD
document.getElementById('forgotPassword').addEventListener('click', function(){
    const email = prompt("Inserisci la tua email per ripristinare la password:");
    if(!email) return alert("Email non inserita!");

    const user = users.find(u => u.email === email);
    if(!user) return alert("Email non trovata!");

    // Simulazione invio codice di reset
    const resetCode = Math.floor(100000 + Math.random() * 900000);
    alert("Codice di reset generato (simulazione): " + resetCode);

    const enteredCode = prompt("Inserisci il codice ricevuto via email:");
    if(parseInt(enteredCode) !== resetCode){
        return alert("Codice errato! Password non modificata.");
    }

    const newPass = prompt("Inserisci la nuova password:");
    if(!newPass) return alert("Password non modificata!");

    user.password = newPass;
    saveUsers();

    alert("Password aggiornata con successo! Ora puoi effettuare il login.");
    document.getElementById('loginEmail').value = user.email;
    document.getElementById('loginPassword').value = "";
});
</script>

</body>
</html>
