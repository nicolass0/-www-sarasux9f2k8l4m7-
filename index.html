<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>LukiPup - Accesso</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- AVVISO -->
<div id="warning">
<h1>LukiPup</h1>
<p>Sei sicuro di voler accedere a questo sito?</p>
<button onclick="entra()">ACCETTA</button>
<button onclick="esci()">ESCI</button>
</div>

<!-- REGISTRAZIONE -->
<div id="register" class="hidden">
<h2>Registrazione</h2>
<input id="regName" placeholder="Nome">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">Registrati</button>
<p>Hai già un account?</p>
<button onclick="vaiLogin()">Vai al Login</button>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
<h2>Login</h2>
<input id="logName" placeholder="Nome">
<input id="logPass" type="password" placeholder="Password">
<button onclick="login()">Accedi</button>
</div>

<!-- HACKING -->
<div id="hacker" class="hidden">
<h1>TRACCIAMENTO SOGGETTO</h1>
<div id="terminals"></div>
<div class="progress">
<div id="bar"></div>
</div>
<p id="status"></p>
</div>

<!-- FINALE -->
<div id="final" class="hidden">
<h1>GRAZIE PER I DATI PERSONALI</h1>
<p>
Ciao DS!<br>
Non preoccuparti, tutto era solo una simulazione.<br>
Nessun dato reale è stato salvato.<br>
Il sistema è solo per effetto scenico.
</p>
</div>

<script src="script.js"></script>
</body>
</html>
