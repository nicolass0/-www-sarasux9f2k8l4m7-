<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat OmiGol Avanzata</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="container">
    <h1>Chat Rooms Stile OmiGol</h1>
    <div>
        <label>Seleziona stanza:</label>
        <select id="roomSelect" onchange="changeRoom()"></select>
        <button onclick="joinRandomRoom()">Random Room</button>
    </div>
    <div id="chat-box" style="height:300px; overflow:auto;"></div>
    <input type="text" id="message" placeholder="Scrivi un messaggio...">
    <button onclick="sendMessage()">Invia</button>
    <button onclick="skipRoom()" style="background:red;">Skip / Nuova stanza</button>
</div>

<script>
let users = JSON.parse(localStorage.getItem('users')) || [];
let currentUserEmail = localStorage.getItem('currentUser');
let currentUser = users.find(u=>u.email===currentUserEmail);
if(!currentUser || !currentUser.profile){ alert("Completa il profilo!"); window.location.href="profile.html"; }

let rooms = JSON.parse(localStorage.getItem('rooms')) || {"room1":[], "room2":[], "room3":[]};
let messages = JSON.parse(localStorage.getItem('messages')) || {};
let currentRoom = null;

// Carica stanze disponibili
function loadRooms(){
    let select = document.getElementById('roomSelect');
    select.innerHTML = "";
    for(let r in rooms){
        let option = document.createElement('option');
        option.value = r;
        option.text = r + " (" + rooms[r].length + " utenti)";
        select.appendChild(option);
    }
}

// Cambia stanza selezionata
function changeRoom(){ joinRoom(document.getElementById('roomSelect').value); }

// Entra in stanza casuale
function joinRandomRoom(){
    let keys = Object.keys(rooms);
    let randomRoom = keys[Math.floor(Math.random()*keys.length)];
    joinRoom(randomRoom);
}

// Entra in stanza
function joinRoom(roomName){
    if(currentRoom){
        rooms[currentRoom] = rooms[currentRoom].filter(e=>e!==currentUserEmail);
    }
    currentRoom = roomName;
    if(!rooms[roomName].includes(currentUserEmail)) rooms[roomName].push(currentUserEmail);
    localStorage.setItem('rooms', JSON.stringify(rooms));
    loadRooms();
    loadMessages();
}

// Skip stanza
function skipRoom(){
    if(!currentRoom) return;
    messages[currentRoom] = [];
    localStorage.setItem('messages', JSON.stringify(messages));
    joinRandomRoom();
}

// Messaggi
function loadMessages(){
    let chatBox = document.getElementById('chat-box');
    chatBox.innerHTML="";
    if(!currentRoom) return;
    let msgs = messages[currentRoom] || [];
    msgs.forEach(m=>{
        let div = document.createElement('div');
        let avatarHTML = '';
        let user = users.find(u=>u.profile.nick===m.from);
        if(user && user.profile.avatar) avatarHTML = `<img src="${user.profile.avatar}" style="width:25px;height:25px;border-radius:50%;vertical-align:middle;margin-right:5px;">`;
        div.innerHTML = `${avatarHTML}<b>${m.from}:</b> ${m.text} <span style="font-size:10px;color:gray;">${m.time}</span>`;
        chatBox.appendChild(div);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage(){
    if(!currentRoom) return;
    let text = document.getElementById('message').value;
    if(!text) return;
    let time = new Date().toLocaleTimeString();
    if(!messages[currentRoom]) messages[currentRoom]=[];
    messages[currentRoom].push({from:currentUser.profile.nick, text, time});
    localStorage.setItem('messages', JSON.stringify(messages));
    document.getElementById('message').value="";
    loadMessages();
}

// Notifiche visive
setInterval(()=>{
    if(!currentRoom) return;
    let chatBox = document.getElementById('chat-box');
    let msgs = messages[currentRoom] || [];
    if(chatBox.childElementCount < msgs.length){
        chatBox.style.borderColor="green";
        setTimeout(()=>{chatBox.style.borderColor="black";},500);
        loadMessages();
    }
}, 1000);

window.onload = function(){ loadRooms(); joinRandomRoom(); }
</script>
</body>
</html>
